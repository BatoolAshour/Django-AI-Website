<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            background: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #2563eb;
            color: white;
        }
        img {
            border-radius: 6px;
        }
        .ai {
            color: #dc2626;
            font-weight: bold;
        }
        .real {
            color: #16a34a;
            font-weight: bold;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2563eb;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Prediction History</h1>

    <table>
        <tr>
            <th>Image</th>
            <th>Label</th>
            <th>Confidence</th>
            <th>Date</th>
        </tr>
        {% for r in results %}
        <tr>
            <td><img src="{{ r.image.image.url }}" width="80" height="80" style="object-fit:cover;"></td>
            <td class="{% if r.label == 'AI-Generated' %}ai{% else %}real{% endif %}">
                {{ r.label }}
            </td>
            <td>{{ r.confidence|floatformat:2 }}</td>
            <td>{{ r.created_at|date:"M d, Y H:i" }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No predictions yet.</td>
        </tr>
        {% endfor %}
    </table>

    <a href="{% url 'classifier:classify' %}">← Upload New Image</a>
</body>
</html>
